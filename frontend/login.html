<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MapNexus — เข้าสู่ระบบ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600&family=Noto+Serif+Thai:wght@500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:'Noto Sans Thai',sans-serif;background:#faf9f6;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem}
.wrapper{display:flex;width:100%;max-width:780px;background:#fff;border-radius:20px;box-shadow:0 4px 32px rgba(0,0,0,0.10);overflow:hidden;min-height:520px}
/* Left Panel */
.left{flex:0 0 300px;background:linear-gradient(160deg,#1a1a1a 0%,#2d2d2d 60%,#1a1a1a 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;position:relative;overflow:hidden}
.left::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(212,175,55,0.15),transparent 60%);pointer-events:none}
.left-logo-img{width:100px;height:100px;object-fit:contain;border-radius:16px;margin-bottom:1.25rem;border:2px solid rgba(212,175,55,0.3)}
.left-logo-placeholder{width:100px;height:100px;background:linear-gradient(135deg,#b8941e,#d4af37);border-radius:16px;display:flex;align-items:center;justify-content:center;margin-bottom:1.25rem;font-family:'Noto Serif Thai',serif;font-size:2.5rem;font-weight:600;color:#1a1a1a;box-shadow:0 4px 20px rgba(212,175,55,0.3)}
.left-name{font-family:'Noto Serif Thai',serif;font-size:1.5rem;font-weight:600;background:linear-gradient(135deg,#f4e4c1,#d4af37);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:0.35rem}
.left-sub{font-size:0.75rem;color:rgba(255,255,255,0.5);margin-bottom:1.5rem}
.left-features{display:flex;flex-direction:column;gap:0.6rem;width:100%}
.left-feat{display:flex;align-items:center;gap:0.6rem;font-size:0.78rem;color:rgba(255,255,255,0.7)}
.left-feat-dot{width:6px;height:6px;border-radius:50%;background:linear-gradient(135deg,#b8941e,#d4af37);flex-shrink:0}
/* Right Panel */
.card{flex:1;padding:1.75rem 1.75rem 1.5rem;display:flex;flex-direction:column;overflow-y:auto}
.logo{text-align:center;margin-bottom:0.875rem}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,#b8941e,#d4af37);border-radius:8px;display:flex;align-items:center;justify-content:center;margin:0 auto 0.3rem;font-family:'Noto Serif Thai',serif;font-size:1rem;font-weight:600;color:#1a1a1a}
.logo-name{font-family:'Noto Serif Thai',serif;font-size:0.95rem;font-weight:600;background:linear-gradient(135deg,#b8941e,#d4af37);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.tabs{display:flex;background:#f0ede8;border-radius:8px;padding:3px;margin-bottom:0.875rem}
.tab{flex:1;padding:0.38rem;border:none;background:transparent;border-radius:6px;font-family:inherit;font-size:0.8rem;font-weight:500;color:#999;cursor:pointer;transition:all 0.2s}
.tab.active{background:#fff;color:#1a1a1a;box-shadow:0 1px 4px rgba(0,0,0,0.08);font-weight:600}
.alert{padding:0.45rem 0.7rem;border-radius:6px;font-size:0.75rem;margin-bottom:0.6rem;display:none}
.alert.success{background:#e8f5e9;color:#2e7d32;border:1px solid #a5d6a7}
.alert.error{background:#ffebee;color:#c62828;border:1px solid #ef9a9a}
.btn-google{width:100%;display:flex;align-items:center;justify-content:center;gap:0.5rem;padding:0.5rem;background:#fff;border:1.5px solid #e0e0e0;border-radius:7px;font-family:inherit;font-size:0.8rem;font-weight:500;color:#1a1a1a;cursor:pointer;transition:all 0.2s;margin-bottom:0.6rem}
.btn-google:hover{background:#f5f5f5}
.divider{display:flex;align-items:center;gap:0.5rem;margin-bottom:0.6rem;color:#ccc;font-size:0.72rem}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#e8e6e1}
.field{margin-bottom:0.5rem}
.label{display:block;font-size:0.72rem;font-weight:600;color:#555;margin-bottom:0.2rem}
.input{width:100%;padding:0.45rem 0.7rem;border:1.5px solid #e8e6e1;border-radius:7px;font-family:inherit;font-size:0.82rem;color:#1a1a1a;background:#fff;outline:none;transition:border-color 0.2s}
.input:focus{border-color:#d4af37;box-shadow:0 0 0 2px rgba(212,175,55,0.1)}
.input-wrap{position:relative}
.input-wrap .input{padding-right:2rem}
.eye{position:absolute;right:0.55rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#bbb;padding:0;display:flex}
.submit{width:100%;padding:0.55rem;background:#1a1a1a;color:#fff;border:none;border-radius:7px;font-family:inherit;font-size:0.85rem;font-weight:600;cursor:pointer;transition:all 0.2s;margin-top:0.2rem}
.submit:hover{background:#333}
.submit:disabled{opacity:0.6;cursor:not-allowed}
.ckbox{display:flex;align-items:flex-start;gap:0.35rem;font-size:0.72rem;color:#555;margin-bottom:0.35rem;cursor:pointer}
.ckbox a{color:#b8941e;text-decoration:none}
.switch{text-align:center;font-size:0.75rem;color:#aaa;margin-top:0.6rem}
.switch a{color:#b8941e;font-weight:600;text-decoration:none}
.forgot{text-align:right;margin-bottom:0.3rem}
.forgot a{font-size:0.72rem;color:#b8941e;text-decoration:none}
.back{text-align:center;margin-top:0.75rem;font-size:0.72rem}
.back a{color:#888;text-decoration:none}
.back a:hover{color:#1a1a1a}
.pwd-bar{height:3px;background:#e8e6e1;border-radius:2px;margin-top:0.25rem;overflow:hidden}
.pwd-bar div{height:100%;border-radius:2px;transition:width 0.3s}
@media(max-width:600px){.wrapper{flex-direction:column;max-width:380px}.left{flex:0 0 auto;padding:1.25rem;min-height:auto}.left-logo-placeholder{width:60px;height:60px;font-size:1.5rem;margin-bottom:0.75rem}.left-name{font-size:1.1rem}.left-features{display:none}.card{padding:1.25rem}}
</style>
</head>
<body>
<div class="wrapper">

  <!-- Left Panel — Logo / Brand -->
  <div class="left">
    <!-- ถ้ามีไฟล์ logo ให้แทนที่ด้วย: <img src="assets/images/logo.png" alt="MapNexus" class="left-logo-img"> -->
    <div class="left-logo-placeholder">M</div>
    <div class="left-name">MapNexus</div>
    <div class="left-sub">การเดินทางที่มีระดับ</div>
    <div class="left-features">
      <div class="left-feat"><span class="left-feat-dot"></span><span>ค้นพบสถานที่ท่องเที่ยว</span></div>
      <div class="left-feat"><span class="left-feat-dot"></span><span>แผนที่แบบเรียลไทม์</span></div>
      <div class="left-feat"><span class="left-feat-dot"></span><span>เช็คอินและแชร์ประสบการณ์</span></div>
      <div class="left-feat"><span class="left-feat-dot"></span><span>รีวิวจากผู้ใช้จริง</span></div>
    </div>
  </div>

  <!-- Right Panel — Form -->
  <div class="card">
  <div class="logo">
    <div class="logo-icon">M</div>
    <div class="logo-name">MapNexus</div>
    <div class="logo-sub">การเดินทางที่มีระดับ</div>
  </div>
  <div class="tabs">
    <button class="tab active" id="t-reg" onclick="sw('reg')">สมัครบัญชี</button>
    <button class="tab" id="t-log" onclick="sw('log')">เข้าสู่ระบบ</button>
  </div>
  <div class="alert" id="al"></div>

  <!-- Register -->
  <div id="f-reg">
    <button class="btn-google" onclick="gsi()">
      <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      สมัครด้วย Google
    </button>
    <div class="divider"><span>หรือ</span></div>
    <form onsubmit="reg(event)">
      <div class="field"><label class="label">Gmail</label><input type="email" id="re" class="input" placeholder="example@gmail.com" required></div>
      <div class="field"><label class="label">รหัสผ่าน</label><div class="input-wrap"><input type="password" id="rp" class="input" placeholder="อย่างน้อย 8 ตัวอักษร" minlength="8" required><button type="button" class="eye" onclick="tp('rp')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button></div><div id="ps"></div></div>
      <div class="field"><label class="label">ยืนยันรหัสผ่าน</label><div class="input-wrap"><input type="password" id="rc" class="input" placeholder="กรอกอีกครั้ง" required><button type="button" class="eye" onclick="tp('rc')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button></div></div>
      <label class="ckbox"><input type="checkbox" required><span>ยอมรับ <a href="#">เงื่อนไข</a> และ <a href="#">นโยบาย</a></span></label>
      <button type="submit" class="submit" id="br">สมัครบัญชี</button>
    </form>
    <p class="switch">มีบัญชีแล้ว? <a href="#" onclick="sw('log')">เข้าสู่ระบบ</a></p>
  </div>

  <!-- Login -->
  <div id="f-log" style="display:none">
    <button class="btn-google" onclick="gsi()">
      <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      เข้าสู่ระบบด้วย Google
    </button>
    <div class="divider"><span>หรือ</span></div>
    <form onsubmit="log(event)">
      <div class="field"><label class="label">Gmail</label><input type="email" id="le" class="input" placeholder="example@gmail.com" required></div>
      <div class="field"><label class="label">รหัสผ่าน</label><div class="input-wrap"><input type="password" id="lp" class="input" placeholder="รหัสผ่าน" required><button type="button" class="eye" onclick="tp('lp')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button></div></div>
      <div class="forgot"><a href="#" onclick="sw('fgt')">ลืมรหัสผ่าน?</a></div>
      <button type="submit" class="submit" id="bl">เข้าสู่ระบบ</button>
    </form>
    <p class="switch">ยังไม่มีบัญชี? <a href="#" onclick="sw('reg')">สมัครฟรี</a></p>
  </div>

  <!-- Forgot -->
  <div id="f-fgt" style="display:none">
    <p style="font-size:0.8rem;color:#666;margin-bottom:0.75rem">กรอก Gmail เพื่อรับลิงก์รีเซ็ตรหัสผ่าน</p>
    <form onsubmit="fgt(event)">
      <div class="field"><label class="label">Gmail</label><input type="email" id="fe" class="input" placeholder="example@gmail.com" required></div>
      <button type="submit" class="submit">ส่งลิงก์รีเซ็ต</button>
    </form>
    <p class="switch"><a href="#" onclick="sw('log')">← กลับ</a></p>
  </div>

  <div class="back"><a href="index.html">← กลับหน้าหลัก</a></div>
</div><!-- end card -->
</div><!-- end wrapper -->
<script>
const p=new URLSearchParams(location.search);
if(p.get('tab')==='login')sw('log');
function sw(t){
  ['reg','log','fgt'].forEach(x=>{document.getElementById('f-'+x).style.display='none'});
  document.getElementById('t-reg').classList.remove('active');
  document.getElementById('t-log').classList.remove('active');
  document.getElementById('f-'+t).style.display='block';
  if(t==='reg')document.getElementById('t-reg').classList.add('active');
  if(t==='log')document.getElementById('t-log').classList.add('active');
  ca();
}
function tp(id){const e=document.getElementById(id);e.type=e.type==='password'?'text':'password'}
function sa(t,m){const e=document.getElementById('al');e.className='alert '+t;e.textContent=m;e.style.display='block'}
function ca(){const e=document.getElementById('al');e.style.display='none'}
document.getElementById('rp').addEventListener('input',function(){
  const v=this.value,s=[v.length>=8,/[A-Z]/.test(v),/[0-9]/.test(v),/[^A-Za-z0-9]/.test(v)].filter(Boolean).length;
  const c=['','#f44336','#ff9800','#4caf50','#2196F3'][s];
  document.getElementById('ps').innerHTML=v?'<div class="pwd-bar"><div style="width:'+(s*25)+'%;background:'+c+'"></div></div>':'';
});
async function reg(e){
  e.preventDefault();ca();
  const em=document.getElementById('re').value.trim(),pw=document.getElementById('rp').value,cf=document.getElementById('rc').value;
  if(!em.endsWith('@gmail.com')){sa('error','กรุณาใช้ Gmail เท่านั้น');return}
  if(pw!==cf){sa('error','รหัสผ่านไม่ตรงกัน');return}
  const b=document.getElementById('br');b.disabled=true;b.textContent='กำลังสมัคร...';
  try{
    const r=await fetch('/api/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:em,password:pw})});
    const d=await r.json();
    if(r.ok){localStorage.setItem('token',d.token);sa('success','สมัครสำเร็จ!');setTimeout(()=>location.href='index.html',1000)}
    else{sa('error',d.message||'ไม่สามารถสมัครได้');b.disabled=false;b.textContent='สมัครบัญชี'}
  }catch{sa('error','ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์');b.disabled=false;b.textContent='สมัครบัญชี'}
}
async function log(e){
  e.preventDefault();ca();
  const em=document.getElementById('le').value.trim(),pw=document.getElementById('lp').value;
  const b=document.getElementById('bl');b.disabled=true;b.textContent='กำลังเข้าสู่ระบบ...';
  try{
    const r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:em,password:pw})});
    const d=await r.json();
    if(r.ok){localStorage.setItem('token',d.token);sa('success','เข้าสู่ระบบสำเร็จ!');setTimeout(()=>location.href='index.html',800)}
    else{sa('error',d.message||'อีเมลหรือรหัสผ่านไม่ถูกต้อง');b.disabled=false;b.textContent='เข้าสู่ระบบ'}
  }catch{sa('error','ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์');b.disabled=false;b.textContent='เข้าสู่ระบบ'}
}
async function fgt(e){
  e.preventDefault();
  const em=document.getElementById('fe').value.trim();
  try{
    const r=await fetch('/api/auth/forgot-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:em})});
    const d=await r.json();
    sa(r.ok?'success':'error',r.ok?'ส่งลิงก์ไปยัง '+em+' แล้ว':(d.message||'ไม่พบอีเมลนี้'));
  }catch{sa('error','ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์')}
}
function gsi(){location.href='/api/auth/google'}
</script>
</body>
</html>
